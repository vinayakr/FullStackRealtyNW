# ── Input: Docker containers log via the fluentd logging driver ───────────────
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# ── Enrich every record with app-level metadata ───────────────────────────────
<filter **>
  @type record_transformer
  <record>
    app      fullstackrealtynw
    env      "#{ENV.fetch('APP_ENV', 'production')}"
    hostname "#{Socket.gethostname}"
  </record>
</filter>

# ── Ship to SumoLogic HTTP Collector ──────────────────────────────────────────
<match **>
  @type http
  endpoint "#{ENV['SUMO_LOGIC_URL']}"
  content_type application/json

  <headers>
    X-Sumo-Category fullstackrealtynw/docker
    X-Sumo-Name     fullstackrealtynw
  </headers>

  open_timeout 10
  read_timeout 60

  <format>
    @type json
  </format>

  <buffer tag>
    @type            file
    path             /fluentd/log/sumo.buffer
    flush_interval   5s
    flush_at_shutdown true
    chunk_limit_size 1m
    retry_max_times  5
    retry_wait       1s
    overflow_action  drop_oldest_chunk
  </buffer>
</match>
