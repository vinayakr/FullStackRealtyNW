# ── Catch-all for anything else ───────────────────────────────────────────────
<match **>
  @type http
  endpoint "#{ENV['SUMO_LOGIC_URL']}"
  content_type application/json

  <headers>
    X-Sumo-Category fullstackrealtynw/other
