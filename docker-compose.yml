services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fullstackrealtynw
      POSTGRES_USER: realty_user
      POSTGRES_PASSWORD: realty_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty_user -d fullstackrealtynw"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  fluentd:
    image: fluent/fluentd:v1.16-debian-1
    volumes:
      - ./fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
      - fluentd_buf:/fluentd/log
    ports:
      - "127.0.0.1:24224:24224"
      - "127.0.0.1:24224:24224/udp"
    environment:
      SUMO_LOGIC_URL: ${SUMO_LOGIC_URL}
      APP_ENV: ${APP_ENV:-production}
    restart: always

  backend:
    build: ./backend
    environment:
      AWS_REGION: ${AWS_REGION:-us-west-2}
      ANTHROPIC_API_KEY_SECRET: ${ANTHROPIC_API_KEY_SECRET:-}
      DATABASE_PASSWORD_SECRET: ${DATABASE_PASSWORD_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATABASE_URL: jdbc:postgresql://postgres:5432/fullstackrealtynw
      DATABASE_USER: realty_user
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-realty_password}
    depends_on:
      postgres:
        condition: service_healthy
      fluentd:
        condition: service_started
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"       # don't block startup if fluentd is slow
        tag: "fullstackrealtynw.backend"
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - fluentd
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "fullstackrealtynw.caddy"
    restart: always

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  fluentd_buf:
